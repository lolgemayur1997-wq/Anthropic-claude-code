name: Social Media Poster

on:
  schedule:
    - cron: '0 3,9,11,14 * * *'  # ~8:30AM, 2:30PM, 4:30PM, 7:30PM IST
  workflow_dispatch:

jobs:
  post-social:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post to social media
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
        run: python scripts/social_run.py

      - name: Commit schedule updates
        run: |
          git config user.name "SmartPicks Bot"
          git config user.email "bot@smartpicks.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto: Update social media schedule"
          git push
