name: AI Documentation Generator

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "packages/**"
      - "plugins/**"
      - "sdk/**"
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**"
      - "packages/**"
      - "plugins/**"
      - "sdk/**"
  workflow_dispatch:
    inputs:
      scope:
        description: "Documentation scope"
        required: false
        default: "changed"
        type: choice
        options:
          - changed
          - full
          - api-only

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed source files
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FILES=$(git diff --name-only HEAD~1 -- 'src/**' 'packages/**' 'plugins/**' 'sdk/**' | head -50)
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'src/**' 'packages/**' 'plugins/**' 'sdk/**' | head -50)
          else
            FILES="all"
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate Documentation
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a technical documentation expert. Update documentation for changed source files.

            ## Changed Files
            ${{ steps.changes.outputs.files }}

            ## Documentation Workflow
            1. **Analyze**: Read the changed files and understand the public API surface
            2. **Check Existing Docs**: Find existing documentation that needs updating
            3. **Update CLAUDE.md**: If architecture or conventions changed, update CLAUDE.md
            4. **Update API Docs**: Update or create JSDoc/TSDoc comments for:
               - Exported functions and classes
               - Public interfaces and types
               - Complex internal logic that needs explanation
            5. **Update README**: If the changes affect user-facing features, update README.md
            6. **Changelog**: Add entries to CHANGELOG.md for notable changes

            ## Documentation Standards
            - Keep CLAUDE.md under 40,000 characters
            - Use JSDoc/TSDoc format for inline documentation
            - Document the "why", not the "what" — code should explain itself
            - Include usage examples for public APIs
            - Don't document obvious things (getters, setters, trivial functions)
            - Keep language concise and technical
          allowed_tools: |
            Read
            Write
            Edit
            Glob
            Grep
            Bash(git diff, git log, git show)
          timeout_minutes: 15

      - name: Commit documentation updates
        if: github.event_name == 'push'
        run: |
          git config user.name "claude-ai[bot]"
          git config user.email "claude-ai[bot]@users.noreply.github.com"
          git add -A docs/ CLAUDE.md README.md CHANGELOG.md '*.md' || true
          git diff --staged --quiet || git commit -m "docs: auto-update documentation for recent changes"
          git push || true
