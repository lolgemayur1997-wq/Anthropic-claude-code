name: AI Documentation Generator

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "packages/**"
      - "plugins/**"
      - "sdk/**"
      - "agents/**"
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**"
      - "packages/**"
      - "plugins/**"
      - "sdk/**"
      - "agents/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed source files
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FILES=$(git diff --name-only HEAD~1 -- 'src/**' 'packages/**' 'plugins/**' 'sdk/**' 'agents/**' | head -30)
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'src/**' 'packages/**' 'plugins/**' 'sdk/**' 'agents/**' | head -30)
          else
            FILES=$(find . -name '*.ts' -o -name '*.tsx' | grep -v node_modules | head -30)
          fi

          CONTENTS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            CONTENTS+="--- $file ---"$'\n'
            CONTENTS+="$(head -80 "$file")"$'\n\n'
          done <<< "$FILES"
          CONTENTS=$(echo "$CONTENTS" | head -c 25000)

          echo "files<<EOFILES" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOFILES" >> $GITHUB_OUTPUT

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "contents<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$CONTENTS" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

      - name: Generate documentation
        id: docs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret is not set. Add it at Settings → Secrets → Actions."
            DOCS="**Error:** \`GEMINI_API_KEY\` secret is not configured. Add it at repo Settings → Secrets and variables → Actions → New repository secret."
          else
            PAYLOAD=$(jq -n \
              --arg files "${{ steps.changes.outputs.files }}" \
              --arg contents "${{ steps.changes.outputs.contents }}" \
              '{
                "contents": [{
                  "parts": [{
                    "text": ("You are a technical documentation expert. Generate documentation for these source files.\n\nFiles:\n" + $files + "\n\nSource:\n" + $contents + "\n\nProvide:\n1. JSDoc/TSDoc comments for exported functions, interfaces, types\n2. A summary of what each module does\n3. Any suggested README updates\n\nDocument the why, not the what. Keep it concise.")
                  }]
                }],
                "generationConfig": {"maxOutputTokens": 4000}
              }')

            RESPONSE=$(curl -s -w "\n%{http_code}" "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" != "200" ]; then
              ERROR_MSG=$(echo "$BODY" | jq -r '.error.message // "Unknown error"')
              echo "::error::Gemini API returned HTTP $HTTP_CODE: $ERROR_MSG"
              DOCS="**Error:** Gemini API returned HTTP $HTTP_CODE — $ERROR_MSG"
            else
              DOCS=$(echo "$BODY" | jq -r '.candidates[0].content.parts[0].text // "No documentation generated (empty response from API)."')
            fi
          fi

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "docs<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$DOCS" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

      - name: Post documentation suggestions
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## AI Documentation Suggestions\n\n${process.env.DOCS}\n\n---\n*Powered by Google Gemini 2.0 Flash (free tier)*`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 65000)
            });
        env:
          DOCS: ${{ steps.docs.outputs.docs }}
