name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD | head -c 30000)
          echo "diff<<EODIFF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EODIFF" >> $GITHUB_OUTPUT

      - name: AI Code Review
        id: review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: AI Code Review" \
            -d "$(jq -n \
              --arg diff "${{ steps.diff.outputs.diff }}" \
              '{
                "model": "meta-llama/llama-4-maverick:free",
                "messages": [
                  {
                    "role": "system",
                    "content": "You are an expert code reviewer. Review the diff and provide findings grouped by severity (critical/warning/suggestion/praise). For each finding include: file, issue, and fix. End with a verdict: APPROVE, REQUEST_CHANGES, or COMMENT."
                  },
                  {
                    "role": "user",
                    "content": ("Review this PR diff:\n\n```diff\n" + $diff + "\n```\n\nCheck for: code quality, security vulnerabilities, performance issues, type safety, test coverage, and conventions.")
                  }
                ],
                "max_tokens": 4000
              }')")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Review failed — no response from model."')
          echo "review<<EOREVIEW" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOREVIEW" >> $GITHUB_OUTPUT

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `## 🤖 AI Code Review\n\n${{ steps.review.outputs.review }}\n\n---\n*Powered by OpenRouter (Llama 4 Maverick — free tier)*`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: review
            });
