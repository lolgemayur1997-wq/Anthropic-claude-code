name: Pinterest Pin Scheduler

on:
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST
    - cron: '30 8 * * *'   # 2:00 PM IST
    - cron: '30 14 * * *'  # 8:00 PM IST
  workflow_dispatch:

jobs:
  post-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process pin queue
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
        run: python scripts/pinterest_run.py

      - name: Commit queue updates
        run: |
          git config user.name "SmartPicks Bot"
          git config user.email "bot@smartpicks.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto: Pinterest pin queue update"
          git push
