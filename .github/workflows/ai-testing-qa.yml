name: AI Testing & QA

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-test-suggestions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files and contents
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' '*.js' '*.py' | head -20)
          else
            FILES=$(git diff --name-only HEAD~1 | head -20)
          fi

          CONTENTS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            CONTENTS+="--- $file ---"$'\n'
            CONTENTS+="$(head -100 "$file")"$'\n\n'
          done <<< "$FILES"
          CONTENTS=$(echo "$CONTENTS" | head -c 25000)

          echo "files<<EOFILES" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOFILES" >> $GITHUB_OUTPUT

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "contents<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$CONTENTS" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

      - name: AI Test Generation
        id: tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PAYLOAD=$(jq -n \
            --arg files "${{ steps.changed.outputs.files }}" \
            --arg contents "${{ steps.changed.outputs.contents }}" \
            '{
              "contents": [{
                "parts": [{
                  "text": ("You are an expert QA engineer. Analyze these source files and generate comprehensive test code.\n\nChanged files:\n" + $files + "\n\nSource code:\n" + $contents + "\n\nGenerate complete, runnable test files covering:\n- Happy path scenarios\n- Edge cases and boundary conditions\n- Error handling paths\n\nUse describe/it/expect syntax. Provide complete test file contents.")
                }]
              }],
              "generationConfig": {"maxOutputTokens": 4000}
            }')

          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          TESTS=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Test generation failed. Check API key."')
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "tests<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$TESTS" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

      - name: Post test suggestions
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## AI Test Suggestions\n\n${process.env.TESTS}\n\n---\n*Powered by Google Gemini 2.0 Flash (free tier)*`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 65000)
            });
        env:
          TESTS: ${{ steps.tests.outputs.tests }}
