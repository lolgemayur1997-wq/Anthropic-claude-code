name: AI Testing & QA

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      test_scope:
        description: "Scope of testing (all, changed)"
        required: false
        default: "changed"

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  ai-test-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' | head -30)
          else
            FILES=$(git diff --name-only HEAD~1 -- '*.ts' '*.tsx' | head -30)
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Read changed file contents
        id: contents
        run: |
          CONTENTS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            CONTENTS+="--- $file ---"$'\n'
            CONTENTS+="$(head -100 "$file")"$'\n\n'
          done <<< "${{ steps.changed.outputs.files }}"
          CONTENTS=$(echo "$CONTENTS" | head -c 25000)
          echo "contents<<EOCONTENT" >> $GITHUB_OUTPUT
          echo "$CONTENTS" >> $GITHUB_OUTPUT
          echo "EOCONTENT" >> $GITHUB_OUTPUT

      - name: AI Test Analysis
        id: tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: AI Testing QA" \
            -d "$(jq -n \
              --arg files "${{ steps.changed.outputs.files }}" \
              --arg contents "${{ steps.contents.outputs.contents }}" \
              '{
                "model": "meta-llama/llama-4-maverick:free",
                "messages": [
                  {
                    "role": "system",
                    "content": "You are an expert QA engineer. Analyze the source files and generate comprehensive test code. Use the bun:test framework (describe, it, expect). Output complete, runnable test files."
                  },
                  {
                    "role": "user",
                    "content": ("Generate tests for these changed files:\n\nFiles:\n" + $files + "\n\nSource code:\n" + $contents + "\n\nProvide complete test files covering: happy paths, edge cases, error handling. Use describe/it/expect from bun:test.")
                  }
                ],
                "max_tokens": 4000
              }')")

          TESTS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Test generation failed."')
          echo "tests<<EOTESTS" >> $GITHUB_OUTPUT
          echo "$TESTS" >> $GITHUB_OUTPUT
          echo "EOTESTS" >> $GITHUB_OUTPUT

      - name: Post test suggestions
        uses: actions/github-script@v7
        with:
          script: |
            const tests = `## 🧪 AI Test Suggestions\n\n${{ steps.tests.outputs.tests }}\n\n---\n*Powered by OpenRouter (Llama 4 Maverick — free tier)*`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: tests
            });

  run-existing-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || true

      - name: Run test suite
        run: bun test 2>&1 | tee test-results.txt || true

      - name: Run type check
        run: bun run typecheck 2>&1 | tee typecheck-results.txt || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.txt
            typecheck-results.txt
