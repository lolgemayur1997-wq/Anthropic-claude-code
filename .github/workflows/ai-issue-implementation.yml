name: AI Issue Implementation

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement-issue:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'ai-implement') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude implement'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || true

      - name: Implement Issue with AI
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are an expert software engineer. Implement the feature or fix described in this issue.

            ## Implementation Workflow
            1. **Understand**: Read the issue thoroughly. Explore the codebase to understand context.
            2. **Plan**: Design the implementation approach. Identify files to create/modify.
            3. **Implement**: Write clean, well-typed code following project conventions.
            4. **Test**: Write tests for your implementation. Run existing tests to ensure nothing breaks.
            5. **Document**: Update relevant documentation if needed.
            6. **Verify**: Run `bun run typecheck` and `bun run format:check` to ensure quality.

            ## Rules
            - Follow all conventions in CLAUDE.md
            - Never use `any` types
            - Keep functions under 10 lines
            - Write tests for all new functionality
            - Use existing patterns and utilities found in the codebase
            - Create a PR with a clear description of changes made

            After implementation, create a pull request linked to this issue.
          allowed_tools: |
            Read
            Write
            Edit
            Glob
            Grep
            Bash(bun test, bun run typecheck, bun run format, bun run format:check, bun run lint, git *)
          timeout_minutes: 25

      - name: Comment on Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ AI implementation attempt failed. Please review the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });
