name: AI Issue Implementation

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement-issue:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'ai-implement') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@ai implement'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get issue details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            core.setOutput('title', issue.data.title);
            core.setOutput('body', issue.data.body || 'No description provided.');

      - name: Get codebase context
        id: context
        run: |
          TREE=$(find . -type f -name '*.ts' -o -name '*.tsx' | grep -v node_modules | grep -v .git | sort | head -50)
          echo "tree<<EOTREE" >> $GITHUB_OUTPUT
          echo "$TREE" >> $GITHUB_OUTPUT
          echo "EOTREE" >> $GITHUB_OUTPUT

      - name: Generate implementation plan
        id: plan
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: AI Issue Implementation" \
            -d "$(jq -n \
              --arg title "${{ steps.issue.outputs.title }}" \
              --arg body "${{ steps.issue.outputs.body }}" \
              --arg tree "${{ steps.context.outputs.tree }}" \
              '{
                "model": "meta-llama/llama-4-maverick:free",
                "messages": [
                  {
                    "role": "system",
                    "content": "You are an expert software engineer. Given an issue and the project file tree, provide a detailed implementation plan with exact file paths and code changes. Output as a step-by-step plan with code blocks."
                  },
                  {
                    "role": "user",
                    "content": ("Issue: " + $title + "\n\nDescription:\n" + $body + "\n\nProject files:\n" + $tree + "\n\nProvide a concrete implementation plan with code.")
                  }
                ],
                "max_tokens": 4000
              }')")

          PLAN=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Planning failed."')
          echo "plan<<EOPLAN" >> $GITHUB_OUTPUT
          echo "$PLAN" >> $GITHUB_OUTPUT
          echo "EOPLAN" >> $GITHUB_OUTPUT

      - name: Comment implementation plan
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `## 🤖 AI Implementation Plan\n\n${{ steps.plan.outputs.plan }}\n\n---\n*Powered by OpenRouter (Llama 4 Maverick — free tier)*\n\n> To apply this plan, a maintainer can create a branch and implement the suggested changes.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: plan
            });
