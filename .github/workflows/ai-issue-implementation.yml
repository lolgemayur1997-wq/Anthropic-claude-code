name: AI Issue Implementation

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  implement-issue:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'ai-implement') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@ai implement'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get issue details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            core.setOutput('title', issue.data.title);
            core.setOutput('body', (issue.data.body || 'No description').slice(0, 5000));

      - name: Get codebase context
        id: context
        run: |
          TREE=$(find . -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.py' \) | grep -v node_modules | grep -v .git | sort | head -50)
          echo "tree<<EOTREE" >> $GITHUB_OUTPUT
          echo "$TREE" >> $GITHUB_OUTPUT
          echo "EOTREE" >> $GITHUB_OUTPUT

      - name: Generate implementation plan
        id: plan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret is not set. Add it at Settings → Secrets → Actions."
            PLAN="**Error:** \`GEMINI_API_KEY\` secret is not configured. Add it at repo Settings → Secrets and variables → Actions → New repository secret."
          else
            PAYLOAD=$(jq -n \
              --arg title "${{ steps.issue.outputs.title }}" \
              --arg body "${{ steps.issue.outputs.body }}" \
              --arg tree "${{ steps.context.outputs.tree }}" \
              '{
                "contents": [{
                  "parts": [{
                    "text": ("You are an expert software engineer. Given this issue and project file tree, provide a detailed implementation plan with exact file paths and complete code changes.\n\nIssue: " + $title + "\n\nDescription:\n" + $body + "\n\nProject files:\n" + $tree + "\n\nProvide step-by-step implementation with full code blocks.")
                  }]
                }],
                "generationConfig": {"maxOutputTokens": 4000}
              }')

            RESPONSE=$(curl -s -w "\n%{http_code}" "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" != "200" ]; then
              ERROR_MSG=$(echo "$BODY" | jq -r '.error.message // "Unknown error"')
              echo "::error::Gemini API returned HTTP $HTTP_CODE: $ERROR_MSG"
              PLAN="**Error:** Gemini API returned HTTP $HTTP_CODE — $ERROR_MSG"
            else
              PLAN=$(echo "$BODY" | jq -r '.candidates[0].content.parts[0].text // "No plan generated (empty response from API)."')
            fi
          fi

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "plan<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$PLAN" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

      - name: Comment implementation plan
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## AI Implementation Plan\n\n${process.env.PLAN}\n\n---\n*Powered by Google Gemini 2.0 Flash (free tier)*`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 65000)
            });
        env:
          PLAN: ${{ steps.plan.outputs.plan }}
