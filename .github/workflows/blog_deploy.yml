name: Deploy Blog

on:
  push:
    paths:
      - 'data/articles/**'
      - 'blog/**'
      - 'config/settings.yaml'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build blog
        run: python -c "from blog.builder import build_site; import yaml; config=yaml.safe_load(open('config/settings.yaml')); print(f'Built {build_site(blog_config=config.get(\"blog\"))} articles')"

      - name: Commit and push built site
        run: |
          git config user.name "SmartPicks Bot"
          git config user.email "bot@smartpicks.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Auto: Rebuild blog"
          git push
